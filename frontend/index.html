<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Agent - AI 股票分析助手</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .gradient-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .card-shadow { box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06); }
        .animate-fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // 模拟数据（不同股票）
        const mockData = {
            'AAPL': {
                symbol: 'AAPL',
                name: 'Apple Inc.',
                price: 168.50,
                change: 2.35,
                changePct: 1.42,
                volume: 2500000,
                marketCap: 2800000000000,
                pe: 28.5,
                pb: 45.2,
                dividendYield: 0.5,
                news: [
                    { title: 'Apple 发布新品', source: 'Reuters', date: '2024-01-10' },
                    { title: 'iPhone 销量超预期', source: 'Bloomberg', date: '2024-01-09' },
                ],
            },
            'NVDA': {
                symbol: 'NVDA',
                name: 'NVIDIA Corporation',
                price: 520.80,
                change: 15.20,
                changePct: 3.01,
                volume: 45000000,
                marketCap: 1300000000000,
                pe: 65.2,
                pb: 42.8,
                dividendYield: 0.03,
                news: [
                    { title: 'NVIDIA AI 芯片需求激增', source: 'CNBC', date: '2024-01-10' },
                    { title: 'NVIDIA 与微软达成合作', source: 'Reuters', date: '2024-01-09' },
                ],
            },
            'TSLA': {
                symbol: 'TSLA',
                name: 'Tesla, Inc.',
                price: 245.60,
                change: -8.40,
                changePct: -3.31,
                volume: 35000000,
                marketCap: 780000000000,
                pe: 72.3,
                pb: 15.6,
                dividendYield: 0,
                news: [
                    { title: 'Tesla 新车型发布', source: 'Bloomberg', date: '2024-01-10' },
                    { title: '自动驾驶技术突破', source: 'Reuters', date: '2024-01-09' },
                ],
            },
            '600519': {
                symbol: '600519',
                name: '贵州茅台',
                price: 1800.00,
                change: 25.00,
                changePct: 1.41,
                volume: 3500000,
                marketCap: 2300000000000,
                pe: 32.5,
                pb: 8.2,
                dividendYield: 1.2,
                news: [
                    { title: '茅台业绩超预期', source: '证券时报', date: '2024-01-10' },
                    { title: '白酒板块集体上涨', source: '东方财富', date: '2024-01-09' },
                ],
            },
        };

        // K 线数据生成器
        function generateKlineData(basePrice, volatility = 0.02) {
            const data = [];
            let price = basePrice;
            for (let i = 1; i <= 10; i++) {
                price = price * (1 + (Math.random() - 0.5) * volatility);
                data.push({
                    date: `01-${String(i).padStart(2, '0')}`,
                    price: Math.round(price * 100) / 100,
                });
            }
            return data;
        }

        // 从用户输入中提取股票代码
        function extractSymbol(input) {
            const upperInput = input.toUpperCase();
            
            // 检查是否包含已知股票代码
            for (const symbol of Object.keys(mockData)) {
                if (upperInput.includes(symbol)) {
                    return symbol;
                }
            }
            
            // 中文股票名称映射
            const nameMap = {
                '英伟达': 'NVDA',
                '特斯拉': 'TSLA',
                '苹果': 'AAPL',
                '茅台': '600519',
                '贵州茅台': '600519',
            };
            
            for (const [name, symbol] of Object.entries(nameMap)) {
                if (input.includes(name)) {
                    return symbol;
                }
            }
            
            return null;
        }

        // Header 组件
        function Header() {
            return (
                <header className="gradient-bg text-white shadow-lg">
                    <div className="container mx-auto px-4 py-4">
                        <div className="flex items-center justify-between">
                            <div className="flex items-center space-x-3">
                                <div className="w-10 h-10 bg-white/20 rounded-lg flex items-center justify-center">
                                    <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" />
                                    </svg>
                                </div>
                                <div>
                                    <h1 className="text-xl font-bold">Stock Agent</h1>
                                    <p className="text-white/80 text-sm">AI 股票分析助手</p>
                                </div>
                            </div>
                            <div className="flex items-center space-x-4">
                                <div className="flex items-center space-x-2 text-sm">
                                    <div className="w-2 h-2 bg-green-400 rounded-full animate-pulse"></div>
                                    <span>实时数据</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </header>
            );
        }

        // StockDashboard 组件
        function StockDashboard({ symbol, onSymbolChange }) {
            const [activeTab, setActiveTab] = useState('quote');
            const chartRef = useRef(null);
            const chartInstance = useRef(null);

            const stockData = mockData[symbol] || mockData['AAPL'];
            const klineData = generateKlineData(stockData.price);

            useEffect(() => {
                if (activeTab === 'kline' && chartRef.current) {
                    if (chartInstance.current) {
                        chartInstance.current.destroy();
                    }

                    const ctx = chartRef.current.getContext('2d');
                    chartInstance.current = new Chart(ctx, {
                        type: 'line',
                        data: {
                            labels: klineData.map(d => d.date),
                            datasets: [{
                                label: '价格',
                                data: klineData.map(d => d.price),
                                borderColor: stockData.change >= 0 ? '#10b981' : '#ef4444',
                                backgroundColor: stockData.change >= 0 ? 'rgba(16, 185, 129, 0.1)' : 'rgba(239, 68, 68, 0.1)',
                                fill: true,
                                tension: 0.4,
                                pointRadius: 4,
                                pointHoverRadius: 6,
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: {
                                legend: { display: false },
                                tooltip: {
                                    backgroundColor: '#1e293b',
                                    titleColor: '#f8fafc',
                                    bodyColor: '#f8fafc',
                                    padding: 12,
                                    displayColors: false,
                                }
                            },
                            scales: {
                                y: {
                                    beginAtZero: false,
                                    grid: { color: 'rgba(0,0,0,0.05)' }
                                },
                                x: {
                                    grid: { display: false }
                                }
                            }
                        }
                    });
                }

                return () => {
                    if (chartInstance.current) {
                        chartInstance.current.destroy();
                    }
                };
            }, [activeTab, symbol]);

            return (
                <div className="bg-white rounded-xl card-shadow overflow-hidden animate-fade-in">
                    {/* 头部 */}
                    <div className="p-6 border-b border-gray-100">
                        <div className="flex items-center justify-between mb-4">
                            <div>
                                <h2 className="text-2xl font-bold text-gray-900">{stockData.symbol}</h2>
                                <p className="text-gray-500">{stockData.name}</p>
                            </div>
                            <div className="text-right">
                                <div className="text-3xl font-bold text-gray-900">
                                    ${stockData.price.toFixed(2)}
                                </div>
                                <div className={`flex items-center justify-end space-x-2 ${stockData.change >= 0 ? 'text-green-600' : 'text-red-600'}`}>
                                    <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} 
                                            d={stockData.change >= 0 ? "M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" : "M13 17h8m0 0V9m0 8l-8-8-4 4-6-6"} />
                                    </svg>
                                    <span className="font-medium">
                                        {stockData.change >= 0 ? '+' : ''}{stockData.change.toFixed(2)} ({stockData.changePct.toFixed(2)}%)
                                    </span>
                                </div>
                            </div>
                        </div>

                        {/* 标签页 */}
                        <div className="flex space-x-1 bg-gray-100 p-1 rounded-lg">
                            {[
                                { id: 'quote', label: '行情', icon: '💰' },
                                { id: 'kline', label: 'K线', icon: '📊' },
                                { id: 'valuation', label: '估值', icon: '📈' },
                                { id: 'news', label: '新闻', icon: '📰' },
                            ].map(({ id, label, icon }) => (
                                <button
                                    key={id}
                                    onClick={() => setActiveTab(id)}
                                    className={`flex-1 flex items-center justify-center space-x-2 py-2 px-4 rounded-md text-sm font-medium transition-all ${
                                        activeTab === id
                                            ? 'bg-white text-blue-600 shadow-sm'
                                            : 'text-gray-600 hover:text-gray-900'
                                    }`}
                                >
                                    <span>{icon}</span>
                                    <span>{label}</span>
                                </button>
                            ))}
                        </div>
                    </div>

                    {/* 内容 */}
                    <div className="p-6">
                        {activeTab === 'quote' && (
                            <div className="grid grid-cols-2 gap-4">
                                <div className="bg-gradient-to-br from-blue-50 to-indigo-50 p-4 rounded-xl">
                                    <p className="text-sm text-gray-500 mb-1">成交量</p>
                                    <p className="text-xl font-bold text-gray-900">
                                        {(stockData.volume / 1000000).toFixed(2)}M
                                    </p>
                                </div>
                                <div className="bg-gradient-to-br from-purple-50 to-pink-50 p-4 rounded-xl">
                                    <p className="text-sm text-gray-500 mb-1">市值</p>
                                    <p className="text-xl font-bold text-gray-900">
                                        ${(stockData.marketCap / 1000000000000).toFixed(2)}T
                                    </p>
                                </div>
                            </div>
                        )}

                        {activeTab === 'kline' && (
                            <div className="h-80">
                                <canvas ref={chartRef}></canvas>
                            </div>
                        )}

                        {activeTab === 'valuation' && (
                            <div className="space-y-4">
                                {[
                                    { label: '市盈率 (PE)', value: stockData.pe, color: 'blue' },
                                    { label: '市净率 (PB)', value: stockData.pb, color: 'purple' },
                                    { label: '股息率', value: `${stockData.dividendYield}%`, color: 'green' },
                                ].map(({ label, value, color }) => (
                                    <div key={label} className={`flex items-center justify-between p-4 bg-${color}-50 rounded-xl`}>
                                        <span className="text-gray-600">{label}</span>
                                        <span className="text-lg font-bold text-gray-900">{value}</span>
                                    </div>
                                ))}
                            </div>
                        )}

                        {activeTab === 'news' && (
                            <div className="space-y-3">
                                {stockData.news.map((news, index) => (
                                    <div key={index} className="p-4 bg-gray-50 rounded-xl hover:bg-gray-100 transition-colors cursor-pointer">
                                        <h4 className="font-medium text-gray-900 mb-1">{news.title}</h4>
                                        <div className="flex items-center space-x-2 text-sm text-gray-500">
                                            <span>{news.source}</span>
                                            <span>•</span>
                                            <span>{news.date}</span>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        // ChatPanel 组件 - 智能识别股票代码
        function ChatPanel({ selectedSymbol, onSymbolChange }) {
            const [messages, setMessages] = useState([]);
            const [input, setInput] = useState('');
            const [isLoading, setIsLoading] = useState(false);
            const messagesEndRef = useRef(null);

            useEffect(() => {
                messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
            }, [messages]);

            const handleSend = async () => {
                if (!input.trim() || isLoading) return;

                const userMessage = { role: 'user', content: input };
                setMessages(prev => [...prev, userMessage]);
                setInput('');
                setIsLoading(true);

                // 识别股票代码
                const detectedSymbol = extractSymbol(input);
                if (detectedSymbol) {
                    onSymbolChange(detectedSymbol);
                }

                const targetSymbol = detectedSymbol || selectedSymbol;
                const stockData = mockData[targetSymbol] || mockData['AAPL'];

                // 模拟 AI 分析
                setTimeout(() => {
                    const botMessage = { 
                        role: 'assistant', 
                        content: `关于 ${stockData.symbol}（${stockData.name}）的分析：\n\n📊 行情数据：\n- 当前价格：$${stockData.price}\n- 涨跌幅：${stockData.changePct >= 0 ? '+' : ''}${stockData.changePct}%\n- 成交量：${(stockData.volume / 1000000).toFixed(2)}M\n- 市值：$${(stockData.marketCap / 1000000000000).toFixed(2)}T\n\n📈 技术指标：\n- RSI：${Math.floor(Math.random() * 40) + 40}（中性区间）\n- MA_20：$${(stockData.price * 0.98).toFixed(2)}\n- MACD：${stockData.change >= 0 ? '金叉' : '死叉'}\n\n💰 估值指标：\n- PE：${stockData.pe}\n- PB：${stockData.pb}\n- 股息率：${stockData.dividendYield}%\n\n📰 最新新闻：\n- ${stockData.news[0].title}\n- ${stockData.news[1].title}\n\n💡 建议：需要综合分析，投资有风险。` 
                    };
                    setMessages(prev => [...prev, botMessage]);
                    setIsLoading(false);
                }, 1500);
            };

            const handleKeyPress = (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    handleSend();
                }
            };

            return (
                <div className="bg-white rounded-xl card-shadow overflow-hidden h-[600px] flex flex-col animate-fade-in">
                    {/* 头部 */}
                    <div className="p-4 gradient-bg">
                        <div className="flex items-center space-x-3">
                            <div className="w-8 h-8 bg-white/20 rounded-lg flex items-center justify-center">
                                <svg className="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z" />
                                </svg>
                            </div>
                            <div>
                                <h3 className="text-white font-semibold">AI 分析助手</h3>
                                <p className="text-white/80 text-sm">实时股票分析</p>
                            </div>
                        </div>
                    </div>

                    {/* 消息列表 */}
                    <div className="flex-1 overflow-y-auto p-4 space-y-4">
                        {messages.length === 0 && (
                            <div className="text-center text-gray-400 py-12">
                                <svg className="w-16 h-16 mx-auto mb-4 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z" />
                                </svg>
                                <p className="text-lg font-medium">开始分析股票</p>
                                <p className="text-sm mt-2">输入股票代码或名称，如 "查一下英伟达"</p>
                            </div>
                        )}

                        {messages.map((msg, index) => (
                            <div
                                key={index}
                                className={`flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'}`}
                            >
                                <div
                                    className={`max-w-[80%] rounded-2xl px-4 py-3 ${
                                        msg.role === 'user'
                                            ? 'bg-blue-500 text-white'
                                            : 'bg-gray-100 text-gray-900'
                                    }`}
                                >
                                    <div className="flex items-start space-x-2">
                                        {msg.role === 'assistant' && (
                                            <svg className="w-4 h-4 mt-1 flex-shrink-0 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                                            </svg>
                                        )}
                                        <div className="whitespace-pre-wrap text-sm">{msg.content}</div>
                                        {msg.role === 'user' && (
                                            <svg className="w-4 h-4 mt-1 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                                            </svg>
                                        )}
                                    </div>
                                </div>
                            </div>
                        ))}

                        {isLoading && (
                            <div className="flex justify-start">
                                <div className="bg-gray-100 rounded-2xl px-4 py-3">
                                    <div className="flex items-center space-x-2">
                                        <svg className="w-4 h-4 animate-spin text-blue-500" fill="none" viewBox="0 0 24 24">
                                            <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle>
                                            <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                                        </svg>
                                        <span className="text-sm text-gray-500">分析中...</span>
                                    </div>
                                </div>
                            </div>
                        )}

                        <div ref={messagesEndRef} />
                    </div>

                    {/* 输入框 */}
                    <div className="p-4 border-t border-gray-100">
                        <div className="flex space-x-2">
                            <input
                                type="text"
                                value={input}
                                onChange={(e) => setInput(e.target.value)}
                                onKeyPress={handleKeyPress}
                                placeholder={`询问股票行情，如 "查一下英伟达"`}
                                className="flex-1 px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                                disabled={isLoading}
                            />
                            <button
                                onClick={handleSend}
                                disabled={!input.trim() || isLoading}
                                className="px-4 py-2 bg-blue-500 text-white rounded-lg hover:bg-blue-600 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 disabled:opacity-50 disabled:cursor-not-allowed transition-colors"
                            >
                                <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
                                </svg>
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        // App 组件
        function App() {
            const [selectedSymbol, setSelectedSymbol] = useState('AAPL');

            return (
                <div className="min-h-screen bg-gradient-to-br from-gray-50 to-gray-100">
                    <Header />
                    <main className="container mx-auto px-4 py-6">
                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                            <div className="lg:col-span-2">
                                <StockDashboard 
                                    symbol={selectedSymbol} 
                                    onSymbolChange={setSelectedSymbol}
                                />
                            </div>
                            <div className="lg:col-span-1">
                                <ChatPanel 
                                  selectedSymbol={selectedSymbol}
                                  onSymbolChange={setSelectedSymbol}
                                />
                            </div>
                        </div>
                    </main>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
