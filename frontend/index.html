<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Agent - AI 股票分析助手</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        * { box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; margin: 0; }
        .gradient-bg { background: linear-gradient(135deg, #1e40af 0%, #7c3aed 100%); }
        .sidebar-gradient { background: linear-gradient(180deg, #1e293b 0%, #0f172a 100%); }
        .animate-fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .scrollbar-thin::-webkit-scrollbar { width: 6px; }
        .scrollbar-thin::-webkit-scrollbar-track { background: transparent; }
        .scrollbar-thin::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }
    </style>
</head>
<body class="h-screen overflow-hidden">
    <div id="root" class="h-full"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        const API_BASE = 'http://localhost:8000';

        // 侧边栏组件
        function Sidebar({ sessions, currentSessionId, onSelectSession, onNewSession }) {
            return (
                <div className="w-64 sidebar-gradient text-white flex flex-col h-full">
                    {/* Logo */}
                    <div className="p-4 border-b border-slate-700">
                        <div className="flex items-center space-x-3">
                            <div className="w-8 h-8 bg-blue-500 rounded-lg flex items-center justify-center">
                                <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" />
                                </svg>
                            </div>
                            <div>
                                <h1 className="font-bold text-lg">Stock Agent</h1>
                                <p className="text-xs text-slate-400">AI 股票分析</p>
                            </div>
                        </div>
                    </div>

                    {/* 新建会话按钮 */}
                    <div className="p-3">
                        <button
                            onClick={onNewSession}
                            className="w-full flex items-center justify-center space-x-2 px-4 py-2.5 bg-blue-600 hover:bg-blue-700 rounded-lg transition-colors"
                        >
                            <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4" />
                            </svg>
                            <span>新建会话</span>
                        </button>
                    </div>

                    {/* 会话列表 */}
                    <div className="flex-1 overflow-y-auto scrollbar-thin px-2">
                        {sessions.map(session => (
                            <div
                                key={session.id}
                                onClick={() => onSelectSession(session.id)}
                                className={`px-3 py-2.5 rounded-lg mb-1 cursor-pointer transition-colors ${
                                    session.id === currentSessionId
                                        ? 'bg-slate-700 text-white'
                                        : 'text-slate-300 hover:bg-slate-800 hover:text-white'
                                }`}
                            >
                                <div className="flex items-center space-x-2">
                                    <svg className="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z" />
                                    </svg>
                                    <span className="text-sm truncate">{session.title || '新会话'}</span>
                                </div>
                                <div className="text-xs text-slate-500 mt-1 ml-6">
                                    {new Date(session.updated_at).toLocaleString('zh-CN', { 
                                        month: 'short', 
                                        day: 'numeric',
                                        hour: '2-digit',
                                        minute: '2-digit'
                                    })}
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        // 消息组件
        function Message({ message }) {
            const isUser = message.role === 'user';
            
            // 处理工具调用消息
            if (Array.isArray(message.content)) {
                const toolUse = message.content.find(b => b.type === 'tool_use');
                const text = message.content.find(b => b.type === 'text');
                
                if (toolUse) {
                    return (
                        <div className="flex justify-start mb-4 animate-fade-in">
                            <div className="bg-slate-100 rounded-xl px-4 py-3 max-w-[80%]">
                                <div className="flex items-center space-x-2 text-sm text-slate-600">
                                    <svg className="w-4 h-4 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                    </svg>
                                    <span>调用工具: <strong>{toolUse.name}</strong></span>
                                </div>
                                {text && <p className="text-sm text-slate-700 mt-2">{text.text}</p>}
                            </div>
                        </div>
                    );
                }
            }
            
            // 普通消息
            const content = typeof message.content === 'string' ? message.content : 
                           Array.isArray(message.content) ? message.content.map(b => b.text || '').join('') : '';
            
            if (!content) return null;

            return (
                <div className={`flex ${isUser ? 'justify-end' : 'justify-start'} mb-4 animate-fade-in`}>
                    <div className={`max-w-[80%] rounded-2xl px-4 py-3 ${
                        isUser 
                            ? 'bg-blue-600 text-white' 
                            : 'bg-white border border-slate-200 text-slate-900 shadow-sm'
                    }`}>
                        {!isUser && (
                            <div className="flex items-center space-x-2 mb-2">
                                <div className="w-6 h-6 bg-gradient-to-br from-blue-500 to-purple-500 rounded-full flex items-center justify-center">
                                    <svg className="w-3.5 h-3.5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                                    </svg>
                                </div>
                                <span className="text-xs font-medium text-slate-500">Stock Agent</span>
                            </div>
                        )}
                        <div className="whitespace-pre-wrap text-sm leading-relaxed">{content}</div>
                    </div>
                </div>
            );
        }

        // 主聊天区域
        function ChatArea({ session, onSendMessage, isLoading }) {
            const [input, setInput] = useState('');
            const messagesEndRef = useRef(null);

            useEffect(() => {
                messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
            }, [session?.messages]);

            const handleSend = () => {
                if (!input.trim() || isLoading) return;
                onSendMessage(input);
                setInput('');
            };

            const handleKeyPress = (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    handleSend();
                }
            };

            return (
                <div className="flex-1 flex flex-col bg-slate-50">
                    {/* 头部 */}
                    <div className="bg-white border-b border-slate-200 px-6 py-4">
                        <div className="flex items-center justify-between">
                            <div>
                                <h2 className="text-lg font-semibold text-slate-900">
                                    {session?.title || 'Stock Agent'}
                                </h2>
                                <p className="text-sm text-slate-500">
                                    {session?.messages?.length || 0} 条消息
                                </p>
                            </div>
                            <div className="flex items-center space-x-2 text-sm text-slate-500">
                                <div className="w-2 h-2 bg-green-500 rounded-full"></div>
                                <span>已连接</span>
                            </div>
                        </div>
                    </div>

                    {/* 消息列表 */}
                    <div className="flex-1 overflow-y-auto px-6 py-4 scrollbar-thin">
                        {!session || session.messages.length === 0 ? (
                            <div className="h-full flex items-center justify-center">
                                <div className="text-center">
                                    <div className="w-20 h-20 bg-gradient-to-br from-blue-100 to-purple-100 rounded-2xl flex items-center justify-center mx-auto mb-4">
                                        <svg className="w-10 h-10 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" />
                                        </svg>
                                    </div>
                                    <h3 className="text-xl font-semibold text-slate-900 mb-2">开始分析股票</h3>
                                    <p className="text-slate-500 mb-6">输入股票代码或名称，AI 会为你分析</p>
                                    <div className="grid grid-cols-2 gap-3 max-w-md mx-auto">
                                        {['NVDA 英伟达', 'AAPL 苹果', 'TSLA 特斯拉', '茅台 600519'].map((item) => (
                                            <button
                                                key={item}
                                                onClick={() => onSendMessage(`帮我分析一下${item.split(' ')[0]}`)}
                                                className="px-4 py-2.5 bg-white border border-slate-200 rounded-lg text-sm text-slate-700 hover:bg-slate-50 hover:border-slate-300 transition-colors"
                                            >
                                                {item}
                                            </button>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        ) : (
                            <>
                                {session.messages.filter(m => m.role !== 'system').map((message, index) => (
                                    <Message key={index} message={message} />
                                ))}
                                {isLoading && (
                                    <div className="flex justify-start mb-4">
                                        <div className="bg-white border border-slate-200 rounded-2xl px-4 py-3 shadow-sm">
                                            <div className="flex items-center space-x-2">
                                                <div className="flex space-x-1">
                                                    <div className="w-2 h-2 bg-blue-500 rounded-full animate-bounce" style={{animationDelay: '0ms'}}></div>
                                                    <div className="w-2 h-2 bg-blue-500 rounded-full animate-bounce" style={{animationDelay: '150ms'}}></div>
                                                    <div className="w-2 h-2 bg-blue-500 rounded-full animate-bounce" style={{animationDelay: '300ms'}}></div>
                                                </div>
                                                <span className="text-sm text-slate-500">分析中...</span>
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </>
                        )}
                        <div ref={messagesEndRef} />
                    </div>

                    {/* 输入框 */}
                    <div className="bg-white border-t border-slate-200 px-6 py-4">
                        <div className="flex space-x-3">
                            <input
                                type="text"
                                value={input}
                                onChange={(e) => setInput(e.target.value)}
                                onKeyPress={handleKeyPress}
                                placeholder="输入股票问题，如：NVDA 现在多少钱？"
                                className="flex-1 px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm"
                                disabled={isLoading}
                            />
                            <button
                                onClick={handleSend}
                                disabled={!input.trim() || isLoading}
                                className="px-5 py-3 bg-blue-600 text-white rounded-xl hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 disabled:opacity-50 disabled:cursor-not-allowed transition-colors"
                            >
                                <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
                                </svg>
                            </button>
                        </div>
                        <p className="text-xs text-slate-400 mt-2">
                            提示：支持股票代码（NVDA、AAPL）或中文名称（英伟达、苹果）
                        </p>
                    </div>
                </div>
            );
        }

        // 主应用
        function App() {
            const [sessions, setSessions] = useState([]);
            const [currentSessionId, setCurrentSessionId] = useState(null);
            const [currentSession, setCurrentSession] = useState(null);
            const [isLoading, setIsLoading] = useState(false);

            // 加载会话列表
            const loadSessions = useCallback(async () => {
                try {
                    const res = await fetch(`${API_BASE}/api/sessions`);
                    const data = await res.json();
                    setSessions(data);
                } catch (e) {
                    console.error('加载会话失败:', e);
                }
            }, []);

            useEffect(() => {
                loadSessions();
            }, [loadSessions]);

            // 创建新会话
            const handleNewSession = useCallback(async () => {
                try {
                    const res = await fetch(`${API_BASE}/api/sessions`, { method: 'POST' });
                    const session = await res.json();
                    setCurrentSessionId(session.id);
                    setCurrentSession(session);
                    loadSessions();
                } catch (e) {
                    console.error('创建会话失败:', e);
                }
            }, [loadSessions]);

            // 选择会话
            const handleSelectSession = useCallback(async (sessionId) => {
                try {
                    const res = await fetch(`${API_BASE}/api/sessions/${sessionId}`);
                    const session = await res.json();
                    setCurrentSessionId(sessionId);
                    setCurrentSession(session);
                } catch (e) {
                    console.error('加载会话失败:', e);
                }
            }, []);

            // 发送消息
            const handleSendMessage = useCallback(async (message) => {
                setIsLoading(true);
                
                try {
                    const res = await fetch(`${API_BASE}/api/chat`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            message: message,
                            session_id: currentSessionId,
                        }),
                    });

                    const data = await res.json();
                    
                    // 更新当前会话
                    setCurrentSessionId(data.session_id);
                    handleSelectSession(data.session_id);
                    loadSessions();
                } catch (e) {
                    console.error('发送消息失败:', e);
                } finally {
                    setIsLoading(false);
                }
            }, [currentSessionId, handleSelectSession, loadSessions]);

            return (
                <div className="h-screen flex">
                    <Sidebar
                        sessions={sessions}
                        currentSessionId={currentSessionId}
                        onSelectSession={handleSelectSession}
                        onNewSession={handleNewSession}
                    />
                    <ChatArea
                        session={currentSession}
                        onSendMessage={handleSendMessage}
                        isLoading={isLoading}
                    />
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
