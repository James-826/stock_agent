<!DOCTYPE html>


<html lang="zh-CN">


<head>


    <meta charset="UTF-8">


    <meta name="viewport" content="width=device-width, initial-scale=1.0">


    <title>Stock Agent - AI Stock Analysis</title>




    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>


    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>


    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>


    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">


    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>


    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>


    <script>


        tailwind.config = {


            theme: {


                extend: {


                    fontFamily: { sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'] },


                    colors: {


                        brand: { 50: '#eff6ff', 100: '#dbeafe', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8', 900: '#1e3a5f' },


                    },


                }


            }


        }


    </script>


    <style>


        * { box-sizing: border-box; }


        .gsap-hidden { opacity: 0; transform: translateY(20px); }


        .gsap-scale-in { opacity: 0; transform: scale(0.8); }


        .gsap-slide-left { opacity: 0; transform: translateX(-30px); }


        .score-bar-fill { width: 0%; transition: width 0.01s; }


        body { font-family: 'Inter', sans-serif; margin: 0; background: #f8fafc; }


        .scrollbar-thin::-webkit-scrollbar { width: 5px; }


        .scrollbar-thin::-webkit-scrollbar-track { background: transparent; }


        .scrollbar-thin::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }


        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }


        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }


        .animate-fadeIn { animation: fadeIn 0.3s ease-out; }


        .animate-pulse-slow { animation: pulse 2s infinite; }


    </style>


    <link rel="stylesheet" href="/src/index.css">
</head>


<body class="h-screen overflow-hidden">


    <div id="root" class="h-full"></div>





    <script type="text/babel">


        const { useState, useEffect, useRef, useCallback } = React;


        const API_BASE = 'http://localhost:8000';





        // ============ Icon Components ============


        const Icons = {


            Send: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" /></svg>,


            Bot: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" /></svg>,


            User: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>,


            TrendUp: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" /></svg>,


            TrendDown: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13 17h8m0 0v-8m0 8l-8-8-4 4-6-6" /></svg>,


            Minus: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M20 12H4" /></svg>,


            Brain: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z" /></svg>,


            BarChart: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" /></svg>,


            News: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10a2 2 0 012 2v1m2 13a2 2 0 01-2-2V7m2 13a2 2 0 002-2V9a2 2 0 00-2-2h-2m-4-3H9M7 16h6M7 8h6v4H7V8z" /></svg>,


            ChevronDown: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 9l-7 7-7-7" /></svg>,


            ChevronRight: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5l7 7-7 7" /></svg>,


            Search: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>,


            Loader: () => <svg className="w-5 h-5 animate-spin" fill="none" viewBox="0 0 24 24"><circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle><path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>,


        };





        // ============ Signal Helpers ============


        const getSignalColor = (signal) => {


            if (signal === 'buy' || signal === 'strong_buy') return 'text-emerald-600 bg-emerald-50 border-emerald-200';


            if (signal === 'sell' || signal === 'strong_sell') return 'text-red-600 bg-red-50 border-red-200';


            return 'text-amber-600 bg-amber-50 border-amber-200';


        };





        const getSignalText = (signal) => {


            const map = { strong_buy: 'Strong Buy', buy: 'Buy', hold: 'Hold', sell: 'Sell', strong_sell: 'Strong Sell' };


            return map[signal] || 'Hold';


        };





        const getScoreColor = (score) => {


            if (score >= 70) return 'bg-emerald-500';


            if (score >= 40) return 'bg-amber-500';


            return 'bg-red-500';


        };





        // ============ AnalysisDashboard ============


        function AnalysisDashboard({ result, opinions, isLoading }) {


            const [expandedAgent, setExpandedAgent] = useState(null);


            const [activeTab, setActiveTab] = useState('overview');


            const dashboardRef = React.useRef(null);


            


            const allOpinions = React.useMemo(() => {


                const fromProps = opinions || [];


                const fromResult = (result && result.opinions) || [];


                const map = {};


                fromResult.forEach(op => { if (op && op.agent_name) map[op.agent_name] = op; });


                fromProps.forEach(op => { if (op && op.agent_name) map[op.agent_name] = op; });


                return Object.values(map);


            }, [opinions, result]);





            React.useEffect(() => {


                if (result && dashboardRef.current && typeof gsap !== 'undefined') {


                    gsap.fromTo(dashboardRef.current, { opacity: 0, y: 20 }, { opacity: 1, y: 0, duration: 0.5, ease: 'power2.out' });


                }


            }, [result]);





            const getSignalLabel = (s) => ({ strong_buy: '强烈买入', buy: '买入', hold: '持有', watch: '观望', reduce: '减仓', sell: '卖出', strong_sell: '强烈卖出', neutral: '中性', oversold: '超卖', overbought: '超买' }[s] || s || '-');


            const getSignalColor = (s) => ({ strong_buy: 'text-emerald-600 bg-emerald-50 border-emerald-200', buy: 'text-emerald-600 bg-emerald-50 border-emerald-200', hold: 'text-amber-600 bg-amber-50 border-amber-200', watch: 'text-blue-600 bg-blue-50 border-blue-200', reduce: 'text-orange-600 bg-orange-50 border-orange-200', sell: 'text-red-600 bg-red-50 border-red-200', strong_sell: 'text-red-600 bg-red-50 border-red-200', neutral: 'text-slate-600 bg-slate-50 border-slate-200' }[s] || 'text-slate-600 bg-slate-50 border-slate-200');


            const getScoreColor = (s) => s >= 70 ? 'bg-emerald-500' : s >= 40 ? 'bg-amber-500' : 'bg-red-500';


            const fmt = (v, dec=1) => v != null && v !== 'N/A' ? (typeof v === 'number' ? v.toFixed(dec) : v) : '-';


            const _score_to_signal = (s) => s >= 80 ? 'strong_buy' : s >= 65 ? 'buy' : s >= 55 ? 'hold' : s >= 45 ? 'watch' : s >= 35 ? 'reduce' : 'sell';





            if (isLoading) return <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-6"><div className="flex items-center justify-center space-x-3 py-12"><Icons.Loader /><span className="text-slate-500">正在分析...</span></div></div>;


            if (!result) return <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-6"><div className="text-center py-12 text-slate-400"><Icons.BarChart /><p className="mt-3">输入股票代码开始分析</p></div></div>;





            const techDetail = result.technical_detail || {};


            const sentDetail = result.sentiment_detail || {};


            const valDetail = result.valuation_detail || {};


            const indicators = techDetail.indicators || result.indicators || {};


            const trend = result.trend || techDetail.trend_state || {};


            const signal = result.signal || 'hold';


            const score = result.score || 0;





            return (


                <div ref={dashboardRef} className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">


                    {/* Header */}


                    <div className="p-5 border-b border-slate-100 bg-gradient-to-r from-slate-50 to-white">


                        <div className="flex items-center justify-between mb-3">


                            <h3 className="text-lg font-bold text-slate-900">{result.stock_name || ''} ({result.stock_code || ''}) 分析报告</h3>


                            <div className={`flex items-center space-x-2 px-4 py-2 rounded-full border ${getSignalColor(signal)}`}>


                                <span className="font-semibold text-sm">{getSignalLabel(signal)}</span>


                            </div>


                        </div>


                        <div className="grid grid-cols-3 gap-4 text-center">


                            <div><div className="text-2xl font-bold text-slate-900">${fmt(result.price, 2)}</div><div className="text-xs text-slate-500">当前价格</div></div>


                            <div><div className={`text-2xl font-bold ${(result.change_pct||0) >= 0 ? 'text-emerald-600' : 'text-red-600'}`}>{fmt(result.change_pct)}%</div><div className="text-xs text-slate-500">日涨跌</div></div>


                            <div><div className="text-2xl font-bold text-slate-900">{score}<span className="text-sm text-slate-400">/100</span></div><div className="text-xs text-slate-500">综合评分</div></div>


                        </div>


                        <div className="mt-3"><div className="w-full bg-slate-100 rounded-full h-2"><div ref={el => { if (el && typeof gsap !== 'undefined') gsap.fromTo(el, {width:'0%'}, {width: score+'%', duration:1, ease:'power3.out'}); }} className={`h-2 rounded-full ${getScoreColor(score)}`} /></div></div>


                    </div>





                    {/* Tabs */}


                    <div className="flex border-b border-slate-200">


                        {[['overview','概览'],['indicators','技术指标'],['news','新闻情报'],['agents','Agent分析']].map(([k,l]) => (


                            <button key={k} onClick={() => setActiveTab(k)} className={`flex-1 py-2.5 text-sm font-medium transition-colors ${activeTab===k ? 'text-blue-600 border-b-2 border-blue-600 bg-blue-50/50' : 'text-slate-500 hover:text-slate-700'}`}>{l}</button>


                        ))}


                    </div>





                    <div className="p-5">


                        {/* 概览 */}


                        {activeTab === 'overview' && (


                            <div className="space-y-4">


                                <div className="bg-slate-50 rounded-lg p-4">


                                    <h4 className="text-sm font-semibold text-slate-700 mb-2">核心判断</h4>


                                    <p className="text-sm text-slate-600 leading-relaxed">{result.reasoning || '暂无分析结论'}</p>


                                </div>


                                {result.block_scores && (


                                    <div className="bg-slate-50 rounded-lg p-4">


                                        <h4 className="text-sm font-semibold text-slate-700 mb-3">分维度评分</h4>


                                        <div className="space-y-3">


                                            {[['technical','技术面','\U0001F4CA', techDetail.sub_scores || {}, {'MA':'\u5747\u7EBF','MACD':'\u52A8\u91CF','RSI':'\u5F3A\u5F31','Bollinger':'\u6CE2\u52A8'}],


                                              ['sentiment','\u60C5\u7EEC\u9762','\U0001F4F0', sentDetail.sub_scores || {}, {'vix':'\u6050\u614C\u6307\u6570','news':'\u65B0\u95FB\u60C5\u611F','momentum':'\u4EF7\u683C\u52A8\u91CF'}],


                                              ['valuation','\u4F30\u503C\u9762','\U0001F4B0', valDetail.sub_scores || {}, {'pe':'PE','pb':'PB','roe':'ROE','dividend':'\u80A1\u606F','profit_margin':'\u5229\u6DA6\u7387','debt':'\u8D1F\u503A\u7387'}]


                                            ].map(([k,label,icon,subs,subLabels]) => (


                                                <div key={k}>


                                                    <div className="flex items-center space-x-3">


                                                        <span className="text-sm w-16">{icon} {label}</span>


                                                        <div className="flex-1 bg-slate-200 rounded-full h-2.5">


                                                            <div className=`h-2.5 rounded-full transition-all duration-500 ${getScoreColor(result.block_scores[k] || 50)}` style={{width: (result.block_scores[k]||50)+'%'}} />


                                                        </div>


                                                        <span className="text-sm font-mono font-bold w-10 text-right">{result.block_scores[k] || '-'}</span>


                                                        <span className=`text-xs px-2 py-0.5 rounded-full ${getSignalColor(_score_to_signal(result.block_scores[k] || 50))}`>{getSignalLabel(_score_to_signal(result.block_scores[k] || 50))}</span>


                                                    </div>


                                                    {subs && Object.keys(subs).length > 0 && (


                                                        <div className="ml-16 mt-1.5 space-y-1">


                                                            {Object.entries(subs).map(([sk, sv]) => (


                                                                <div key={sk} className="flex items-center space-x-2">


                                                                    <span className="text-xs text-slate-500 w-16">{subLabels[sk] || sk}</span>


                                                                    <div className="flex-1 bg-slate-200 rounded-full h-1.5">


                                                                        <div className=`h-1.5 rounded-full transition-all duration-500 ${getScoreColor(sv || 50)}` style={{width: (sv||50)+'%'}} />


                                                                    </div>


                                                                    <span className="text-xs font-mono text-slate-600 w-6 text-right">{sv || '-'}</span>


                                                                </div>


                                                            ))}


                                                        </div>


                                                    )}


                                                </div>


                                            ))}


                                        </div>


                                    </div>


                                )}


                                {result.confidence_level && (


                                    <div className="flex items-center space-x-2 text-sm text-slate-600">


                                        <span>置信度:</span>


                                        <span className={`px-2 py-0.5 rounded-full text-xs font-medium ${result.confidence_level === '高' ? 'bg-emerald-100 text-emerald-700' : result.confidence_level === '中' ? 'bg-amber-100 text-amber-700' : 'bg-slate-100 text-slate-600'}`}>{result.confidence_level}</span>


                                    </div>


                                )}


                                {result.action_advice && (


                                    <div className="bg-blue-50 rounded-lg p-4 border border-blue-100">


                                        <h4 className="text-sm font-semibold text-blue-700 mb-2">操作建议</h4>


                                        <p className="text-sm text-blue-800 leading-relaxed">{result.action_advice}</p>


                                    </div>


                                )}


                                {result.news && (


                                    <div className="bg-slate-50 rounded-lg p-4">


                                        <h4 className="text-sm font-semibold text-slate-700 mb-2">新闻摘要</h4>


                                        <p className="text-sm text-slate-600 leading-relaxed whitespace-pre-wrap">{typeof result.news === 'string' ? result.news.substring(0, 500) : JSON.stringify(result.news).substring(0, 500)}</p>


                                    </div>


                                )}


                            </div>


                        )}





                        {/* 技术指标 */}


                        {activeTab === 'indicators' && (


                            <div className="space-y-3">


                                {indicators.MA && <div className="bg-slate-50 rounded-lg p-3"><div className="flex justify-between items-center mb-2"><span className="text-sm font-semibold text-slate-700">均线系统 (MA)</span><span className={`text-xs px-2 py-0.5 rounded-full ${getSignalColor(indicators.MA.signal)}`}>{getSignalLabel(indicators.MA.signal)}</span></div><div className="grid grid-cols-3 gap-2 text-xs"><div className="text-center"><div className="font-mono font-bold">${fmt(indicators.MA.MA5)}</div><div className="text-slate-500">MA5</div></div><div className="text-center"><div className="font-mono font-bold">${fmt(indicators.MA.MA10)}</div><div className="text-slate-500">MA10</div></div><div className="text-center"><div className="font-mono font-bold">${fmt(indicators.MA.MA20)}</div><div className="text-slate-500">MA20</div></div></div></div>}


                                {indicators.MACD && <div className="bg-slate-50 rounded-lg p-3"><div className="flex justify-between items-center mb-2"><span className="text-sm font-semibold text-slate-700">MACD</span><span className={`text-xs px-2 py-0.5 rounded-full ${getSignalColor(indicators.MACD.signal)}`}>{getSignalLabel(indicators.MACD.signal)}</span></div><div className="grid grid-cols-3 gap-2 text-xs"><div className="text-center"><div className="font-mono font-bold">{fmt(indicators.MACD.DIF)}</div><div className="text-slate-500">DIF</div></div><div className="text-center"><div className="font-mono font-bold">{fmt(indicators.MACD.DEA)}</div><div className="text-slate-500">DEA</div></div><div className="text-center"><div className={`font-mono font-bold ${(indicators.MACD.MACD_bar||0) >= 0 ? 'text-emerald-600' : 'text-red-600'}`}>{fmt(indicators.MACD.MACD_bar)}</div><div className="text-slate-500">MACD柱</div></div></div></div>}


                                {indicators.RSI && <div className="bg-slate-50 rounded-lg p-3"><div className="flex justify-between items-center"><span className="text-sm font-semibold text-slate-700">RSI (相对强弱)</span><div className="flex items-center space-x-2"><span className="font-mono font-bold text-lg">{fmt(indicators.RSI.RSI)}</span><span className={`text-xs px-2 py-0.5 rounded-full ${getSignalColor(indicators.RSI.signal)}`}>{getSignalLabel(indicators.RSI.signal)}</span></div></div></div>}


                                {indicators.Bollinger && <div className="bg-slate-50 rounded-lg p-3"><div className="flex justify-between items-center mb-2"><span className="text-sm font-semibold text-slate-700">布林带 (Bollinger)</span><span className={`text-xs px-2 py-0.5 rounded-full ${getSignalColor(indicators.Bollinger.signal)}`}>{getSignalLabel(indicators.Bollinger.signal)}</span></div><div className="grid grid-cols-3 gap-2 text-xs"><div className="text-center"><div className="font-mono font-bold text-red-500">${fmt(indicators.Bollinger.upper)}</div><div className="text-slate-500">上轨</div></div><div className="text-center"><div className="font-mono font-bold">${fmt(indicators.Bollinger.middle)}</div><div className="text-slate-500">中轨</div></div><div className="text-center"><div className="font-mono font-bold text-emerald-500">${fmt(indicators.Bollinger.lower)}</div><div className="text-slate-500">下轨</div></div></div></div>}


                                {sentDetail.vix && sentDetail.vix.VIX && <div className="bg-slate-50 rounded-lg p-3"><div className="flex justify-between items-center"><span className="text-sm font-semibold text-slate-700">VIX 恐慌指数</span><div className="flex items-center space-x-2"><span className="font-mono font-bold text-lg">{fmt(sentDetail.vix.VIX)}</span><span className={`text-xs px-2 py-0.5 rounded-full ${getSignalColor(_score_to_signal(sentDetail.vix.score || 50))}`}>{getSignalLabel(_score_to_signal(sentDetail.vix.score || 50))}</span></div></div></div>}


                                {valDetail.data && valDetail.data.PE && <div className="bg-slate-50 rounded-lg p-3"><div className="flex justify-between items-center mb-2"><span className="text-sm font-semibold text-slate-700">估值指标</span><span className={`text-xs px-2 py-0.5 rounded-full ${getSignalColor(_score_to_signal(valDetail.score || 50))}`}>{getSignalLabel(_score_to_signal(valDetail.score || 50))}</span></div><div className="grid grid-cols-3 gap-2 text-xs"><div className="text-center"><div className="font-mono font-bold">{fmt(valDetail.data.PE)}</div><div className="text-slate-500">PE (TTM)</div></div><div className="text-center"><div className="font-mono font-bold">{fmt(valDetail.data.PB)}</div><div className="text-slate-500">PB</div></div><div className="text-center"><div className="font-mono font-bold">{valDetail.data.market_cap ? (valDetail.data.market_cap / 1e12).toFixed(2) + 'T' : '-'}</div><div className="text-slate-500">市值</div></div></div></div>}


                                {Object.keys(indicators).length === 0 && <p className="text-sm text-slate-400 text-center py-6">暂无技术指标数据</p>}


                            </div>


                        )}





                        {/* 新闻情报 */}


                        {activeTab === 'news' && (


                            <div className="space-y-3">


                                {result.news ? (


                                    <div className="bg-slate-50 rounded-lg p-4"><p className="text-sm text-slate-700 leading-relaxed whitespace-pre-wrap">{typeof result.news === 'string' ? result.news : JSON.stringify(result.news, null, 2)}</p></div>


                                ) : <p className="text-sm text-slate-400 text-center py-6">暂无新闻数据</p>}


                            </div>


                        )}





                        {/* Agent分析 */}


                        {activeTab === 'agents' && (


                            <div className="space-y-3">


                                {allOpinions.length > 0 ? allOpinions.map(op => (


                                    <div key={op.agent_name} className="border border-slate-200 rounded-lg overflow-hidden">


                                        <button onClick={() => setExpandedAgent(expandedAgent === op.agent_name ? null : op.agent_name)} className="w-full flex items-center justify-between p-3 hover:bg-slate-50">


                                            <div className="flex items-center space-x-3">


                                                <div className={`p-1.5 rounded-lg ${getSignalColor(op.signal)}`}>{op.agent_name === 'technical' ? <Icons.BarChart /> : op.agent_name === 'intel' ? <Icons.News /> : <Icons.Brain />}</div>


                                                <div className="text-left"><div className="font-semibold text-slate-900 text-sm">{op.agent_name === 'technical' ? '技术面分析' : op.agent_name === 'intel' ? '消息面分析' : '综合决策'}</div><div className="text-xs text-slate-500">{getSignalLabel(op.signal)} | 置信度 {fmt(op.confidence * 100, 0)}%</div></div>


                                            </div>


                                            {expandedAgent === op.agent_name ? <Icons.ChevronDown /> : <Icons.ChevronRight />}


                                        </button>


                                        {expandedAgent === op.agent_name && <div className="p-3 bg-slate-50 border-t border-slate-200 text-sm text-slate-600">{op.reasoning}</div>}


                                    </div>


                                )) : <p className="text-sm text-slate-400 text-center py-6">暂无Agent分析数据</p>}


                            </div>


                        )}


                    </div>


                </div>


            );


        }





        // ============ ThinkingProcess ============


        function ThinkingProcess({ steps, isRunning }) {


            const [expanded, setExpanded] = useState(new Set([0]));





            const toggle = (i) => {


                setExpanded(prev => {


                    const next = new Set(prev);


                    next.has(i) ? next.delete(i) : next.add(i);


                    return next;


                });


            };





            if (steps.length === 0 && !isRunning) return null;





            return (


                <div className="bg-slate-50 border border-slate-200 rounded-lg overflow-hidden animate-fadeIn">


                    <div className="px-4 py-3 border-b border-slate-200 bg-slate-100 flex items-center space-x-2">


                        <Icons.Brain />


                        <span className="text-sm font-semibold text-slate-700">Thinking Process</span>


                        {isRunning && <Icons.Loader />}


                    </div>


                    <div className="p-3 space-y-2">


                        {steps.map((step, i) => (


                            <div key={i} className="thinking-step border border-slate-200 rounded-lg bg-white overflow-hidden gsap-slide-left">


                                <button onClick={() => toggle(i)} className="w-full flex items-center justify-between p-3 hover:bg-slate-50 transition-colors">


                                    <div className="flex items-center space-x-3">


                                        <div className="w-6 h-6 rounded-full bg-blue-100 flex items-center justify-center text-xs font-bold text-blue-600">{i + 1}</div>


                                        <span className="text-sm font-medium text-slate-700">{step}</span>


                                    </div>


                                    {expanded.has(i) ? <Icons.ChevronDown /> : <Icons.ChevronRight />}


                                </button>


                            </div>


                        ))}


                        {isRunning && (


                            <div className="flex items-center justify-center py-3 space-x-2">


                                <Icons.Loader />


                                <span className="text-sm text-slate-500">Processing...</span>


                            </div>


                        )}


                    </div>


                </div>


            );


        }





        // ============ Main App ============


        


        // ============ GSAP Animation Helpers ============


        const useGsapAnimate = (deps) => {


            const ref = React.useRef(null);


            React.useEffect(() => {


                if (ref.current && typeof gsap !== 'undefined') {


                    gsap.fromTo(ref.current,


                        { opacity: 0, y: 20 },


                        { opacity: 1, y: 0, duration: 0.5, ease: 'power2.out' }


                    );


                }


            }, deps);


            return ref;


        };





        const animateStagger = (selector, delay = 0.08) => {


            if (typeof gsap === 'undefined') return;


            gsap.fromTo(selector,


                { opacity: 0, x: -20 },


                { opacity: 1, x: 0, duration: 0.4, stagger: delay, ease: 'power2.out' }


            );


        };





        const animateScoreBar = (element, targetPercent) => {


            if (typeof gsap === 'undefined' || !element) return;


            gsap.fromTo(element,


                { width: '0%' },


                { width: targetPercent + '%', duration: 1.2, ease: 'power3.out', delay: 0.3 }


            );


        };





        const animatePopIn = (element) => {


            if (typeof gsap === 'undefined' || !element) return;


            gsap.fromTo(element,


                { opacity: 0, scale: 0.5 },


                { opacity: 1, scale: 1, duration: 0.5, ease: 'back.out(1.7)' }


            );


        };





        const animateSlideUp = (element, delay = 0) => {


            if (typeof gsap === 'undefined' || !element) return;


            gsap.fromTo(element,


                { opacity: 0, y: 30 },


                { opacity: 1, y: 0, duration: 0.6, ease: 'power2.out', delay }


            );


        };








        // ============ Analysis Cache (per-day) ============


        const getCachedAnalysis = (symbol) => {


            try {


                const key = `analysis_${symbol}`;


                const raw = localStorage.getItem(key);


                if (!raw) return null;


                const cached = JSON.parse(raw);


                const today = new Date().toISOString().split('T')[0];


                if (cached.date !== today) { localStorage.removeItem(key); return null; }


                return cached.data;


            } catch(e) { return null; }


        };


        const setCachedAnalysis = (symbol, data) => {


            try {


                const today = new Date().toISOString().split('T')[0];


                localStorage.setItem(`analysis_${symbol}`, JSON.stringify({date: today, data}));


            } catch(e) {}


        };





function App() {


            const [selectedSymbol, setSelectedSymbol] = useState('NVDA');


            const [input, setInput] = useState('');


            const [messages, setMessages] = useState([]);


            const [isStreaming, setIsStreaming] = useState(false);


            const [analysisResult, setAnalysisResult] = useState(null);


            const [quickData, setQuickData] = useState(null);  // quick-analyze data (never overwritten)


            const [agentOpinions, setAgentOpinions] = useState([]);


            const [thinkingSteps, setThinkingSteps] = useState([]);


            const [sessionId, setSessionId] = useState(null);


            const messagesEndRef = useRef(null);





            useEffect(() => {


                messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });


            }, [messages, thinkingSteps]);





            const handleStockSelect = useCallback(async (symbol) => {


                setSelectedSymbol(symbol);


                setAnalysisResult(null);


                setAgentOpinions([]);


                setThinkingSteps([]);


                setIsStreaming(true);


                


                // Check cache first


                const cached = getCachedAnalysis(symbol);


                if (cached) {


                    console.log('[CACHE] Using cached data for', symbol);


                    setQuickData(cached);


                    setAnalysisResult(cached);


                    setAgentOpinions(cached.opinions || []);


                    setIsStreaming(false);


                    return;


                }


                // Fetch fresh data


                try {


                    const res = await fetch(`${API_BASE}/api/quick-analyze/${symbol}`);


                    const data = await res.json();


                    if (data.result) {


                        setQuickData(data.result);


                        setAnalysisResult(data.result);


                        setAgentOpinions(data.result.opinions || []);


                        setCachedAnalysis(symbol, data.result);


                    }


                } catch(e) { console.error('[QUICK] Error:', e); }


                


                // Also trigger chat for streaming response


                try {


                    const msg = `分析${symbol}`;


                    const chatRes = await fetch(`${API_BASE}/api/chat`, {


                        method: 'POST',


                        headers: { 'Content-Type': 'application/json' },


                        body: JSON.stringify({ message: msg, session_id: sessionId, type: 'analyze' }),


                    });


                    const reader = chatRes.body.getReader();


                    const decoder = new TextDecoder();


                    let buffer = '';


                    let finalContent = '';


                    const steps = [];


                    


                    while (true) {


                        const { done, value } = await reader.read();


                        if (done) break;


                        buffer += decoder.decode(value, { stream: true });


                        const lines = buffer.split('\n');


                        buffer = lines.pop() || '';


                        


                        for (const line of lines) {


                            if (!line.startsWith('data: ')) continue;


                            const data = line.slice(6).trim();


                            if (data === '[DONE]') break;


                            try {


                                const event = JSON.parse(data);


                                if (event.type === 'text') {


                                    steps.push(event.content);


                                    setThinkingSteps([...steps]);


                                } else if (event.type === 'tool_use') {


                                    const labels = {stock_quote:'获取行情',stock_kline:'获取K线',analyze_trend:'技术分析',stock_valuation:'查询估值',stock_news:'搜索新闻'};


                                    steps.push(labels[event.name] || event.name);


                                    setThinkingSteps([...steps]);


                                } else if (event.type === 'final_response') {


                                    let raw = event.content || '';


                                    try { const p = JSON.parse(raw); if(p.reasoning) raw = p.reasoning + (p.action_advice ? '\n\n> ' + p.action_advice : ''); } catch(e){}


                                    finalContent = raw;


                                } else if (event.type === 'session_id') {


                                    setSessionId(event.session_id);


                                }


                            } catch(e){}


                        }


                    }


                    if (finalContent) {


                        setMessages(prev => [...prev, {role:'user', content: `分析${symbol}`}, {role:'assistant', content: finalContent}]);


                    }


                    setThinkingSteps([]);


                } catch(e) { console.error('[CHAT] Error:', e); }


                setIsStreaming(false);


            }, [sessionId]);





            const handleSend = useCallback(async () => {


                if (!input.trim() || isStreaming) return;





                const userMsg = { role: 'user', content: input };


                setMessages(prev => [...prev, userMsg]);


                const currentInput = input;


                setInput('');


                setIsStreaming(true);


                setThinkingSteps([]);


                setAnalysisResult(null);


                setAgentOpinions([]);


                    // 自动识别股票代码，更新左侧面板标题


                    const stockMatch = currentInput.match(/(?:分析|查看|看看)\s*([A-Za-z][A-Za-z0-9]{0,4})/i)


                        || currentInput.match(/\b([A-Z]{1,5})\b/);


                    if (stockMatch) {


                        const code = stockMatch[1].toUpperCase();


                        if (code.length >= 1 && code.length <= 5) {


                            setSelectedSymbol(code);


                        }


                    }





                try {


                    // 检测是否是分析请求


                    const isAnalyze = currentInput.match(/分析|查看|analyze|check|英伟达|苹果|特斯拉|微软|谷歌|NVDA|AAPL|TSLA|MSFT|GOOGL/i);


                    const stockCodeMatch = currentInput.match(/(?:分析|查看)?\s*([A-Za-z]{2,5})/i) || currentInput.match(/(英伟达|苹果|特斯拉|微软|谷歌)/);


                    


                    // 如果是分析请求，先调用quick-analyze获取dashboard数据


                    if (isAnalyze) {


                        let code = stockCodeMatch ? stockCodeMatch[1] : selectedSymbol;


                        // 中文名映射


                        const nameMap = {英伟达:'NVDA',苹果:'AAPL',特斯拉:'TSLA',微软:'MSFT',谷歌:'GOOGL',英特尔:'INTC',博通:'AVGO'};


                        if (nameMap[code]) code = nameMap[code];


                        code = code.toUpperCase();


                        console.log('[QUICK] Fetching quick-analyze for:', code);


                        // Check cache


                            const cachedAnalysis = getCachedAnalysis(code);


                            if (cachedAnalysis) {


                                console.log('[CACHE] Using cached for', code);


                                setQuickData(cachedAnalysis);


                                setAnalysisResult(prev => {


                                    const base = prev || {};


                                    return { ...cachedAnalysis, ...base, price: cachedAnalysis.price || base.price, change_pct: cachedAnalysis.change_pct || base.change_pct, stock_name: cachedAnalysis.stock_name || base.stock_name, technical_detail: cachedAnalysis.technical_detail || base.technical_detail, sentiment_detail: cachedAnalysis.sentiment_detail || base.sentiment_detail, valuation_detail: cachedAnalysis.valuation_detail || base.valuation_detail };


                                });


                            } else {


                            fetch(`${API_BASE}/api/quick-analyze/${code}`).then(r => r.json()).then(data => {


                            console.log('[QUICK] Dashboard data:', data);


                            if (data.result) {


                                setQuickData(data.result);


                                setAnalysisResult(prev => {


                                    const base = prev || {};


                                    return { ...data.result, ...base, 


                                        price: data.result.price || base.price,


                                        score: data.result.score || base.score || 0,


                                        change_pct: data.result.change_pct || base.change_pct,


                                        stock_name: data.result.stock_name || base.stock_name,


                                        technical_detail: data.result.technical_detail || base.technical_detail,


                                        sentiment_detail: data.result.sentiment_detail || base.sentiment_detail,


                                        valuation_detail: data.result.valuation_detail || base.valuation_detail,


                                        news: data.result.news || base.news,


                                    };


                                });


                                setAgentOpinions(data.result.opinions || []);


                            }


                        }).catch(e => console.error('[QUICK] Error:', e)); }


                    }


                    


                    const res = await fetch(`${API_BASE}/api/chat`, {


                        method: 'POST',


                        headers: { 'Content-Type': 'application/json' },


                        body: JSON.stringify({ message: currentInput, session_id: sessionId, type: isAnalyze ? 'analyze' : 'chat' }),


                    });





                    const reader = res.body.getReader();


                    const decoder = new TextDecoder();


                    let buffer = '';


                    let finalContent = '';


                    const steps = [];





                    while (true) {


                        const { done, value } = await reader.read();


                        if (done) break;


                        buffer += decoder.decode(value, { stream: true });


                        const lines = buffer.split('\n');


                        buffer = lines.pop() || '';





                        for (const line of lines) {


                            if (!line.startsWith('data: ')) continue;


                            const data = line.slice(6).trim();


                            if (data === '[DONE]') { console.log('[SSE] DONE received'); break; }


                            try {


                                const event = JSON.parse(data);


                                console.log('[SSE] Event:', event.type);


                                if (event.type === 'text') {


                                    // text不加入思考步骤


                                } else if (event.type === 'tool_use') {


                                    const toolLabels = {


                                        stock_quote: '获取行情数据',


                                        stock_valuation: '查询估值指标',


                                        stock_news: '搜索相关新闻',


                                        stock_kline: '获取K线数据',


                                        analyze_trend: '技术趋势分析',


                                    };


                                    steps.push(toolLabels[event.name] || `调用 ${event.name}`);


                                    setThinkingSteps([...steps]);


                                } else if (event.type === 'agent_complete') {


                                    const agentLabels = {technical: '技术面分析', intel: '消息面分析', decision: '综合决策'};


                                    steps.push((agentLabels[event.agent_name] || event.agent_name) + ' 完成');


                                    setThinkingSteps([...steps]);


                                } else if (event.type === 'analysis_result') {


                                    console.log('[SSE] analysis_result merging...');


                                    setAnalysisResult(prev => {


                                        const base = prev || {};


                                        const incoming = event.result || {};


                                        return {


                                            ...incoming,


                                            price: incoming.price || base.price,


                                            score: (incoming.score && incoming.score > 0) ? incoming.score : (base.score || 0),


                                            change_pct: incoming.change_pct || base.change_pct,


                                            stock_name: incoming.stock_name || base.stock_name,


                                            technical_detail: incoming.technical_detail || base.technical_detail,


                                            sentiment_detail: incoming.sentiment_detail || base.sentiment_detail,


                                            valuation_detail: incoming.valuation_detail || base.valuation_detail,


                                            news: incoming.news || base.news,


                                        };


                                    });


                                    if (event.result && event.result.opinions) {


                                        setAgentOpinions(event.result.opinions);


                                    }


                                } else if (event.type === 'final_response') {


                                    let raw = event.content || '';


                                    try {


                                        const parsed = JSON.parse(raw);


                                        // Extract structured data from orchestrator output


                                        if (parsed.reasoning) {


                                            finalContent = parsed.reasoning;


                                            if (parsed.action_advice) finalContent += '\n\n> ' + parsed.action_advice;


                                        } else if (parsed.opinions) {


                                            // It's the full dashboard JSON, build a summary


                                            const parts = [];


                                            parsed.opinions.forEach(op => {


                                                const name = op.agent_name === 'technical' ? '技术面' : op.agent_name === 'intel' ? '消息面' : '综合决策';


                                                parts.push(`**${name}**: ${op.reasoning || '-'}`);


                                            });


                                            finalContent = parts.join('\n\n');


                                        } else {


                                            finalContent = raw;


                                        }


                                    } catch(e) {


                                        finalContent = raw;


                                    }


                                } else if (event.type === 'session_id') {


                                    setSessionId(event.session_id);


                                }


                            } catch (e) {}


                        }


                    }





                    if (finalContent) {


                        setMessages(prev => [...prev, { role: 'assistant', content: finalContent }]);


                    }


                    // 思考步骤保留，不在此清空，新消息开始时才清空


                } catch (error) {


                    setMessages(prev => [...prev, { role: 'assistant', content: `Error: ${error.message}. Make sure the backend is running on port 8000.` }]);


                } finally {


                    setIsStreaming(false);


                }


            }, [input, isStreaming, sessionId]);





            const handleKeyPress = (e) => {


                if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); }


            };





            return (


                <div className="h-screen flex bg-gradient-to-br from-slate-50 to-slate-100">


                    {/* Left: Analysis Dashboard */}


                    <div className="w-2/3 p-6 overflow-y-auto scrollbar-thin space-y-4">


                        {/* Stock Header */}


                        <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-4">


                            <div className="flex items-center space-x-4">


                                <div className="p-2 bg-blue-50 rounded-lg"><Icons.BarChart /></div>


                                <div>


                                    <h1 className="text-2xl font-bold text-slate-900">{selectedSymbol}</h1>


                                    <p className="text-sm text-slate-500">Stock Analysis Dashboard</p>


                                </div>


                            </div>


                            <div className="mt-3 flex space-x-2">


                                {['NVDA', 'AAPL', 'MSFT', 'TSLA', 'GOOGL'].map(s => (


                                    <button key={s} onClick={() => handleStockSelect(s)}


                                        className={`px-3 py-1.5 rounded-lg text-sm font-medium transition-all cursor-pointer ${selectedSymbol === s ? 'bg-blue-500 text-white shadow-sm' : 'bg-slate-100 text-slate-600 hover:bg-slate-200'}`} onMouseEnter={(e) => typeof gsap !== 'undefined' && gsap.to(e.target, {scale: 1.08, duration: 0.2, ease: 'power2.out'})} onMouseLeave={(e) => typeof gsap !== 'undefined' && gsap.to(e.target, {scale: 1, duration: 0.2, ease: 'power2.out'})}>


                                        {s}


                                    </button>


                                ))}


                            </div>


                        </div>





                        {/* Analysis Dashboard */}


                        <AnalysisDashboard result={analysisResult} opinions={agentOpinions} isLoading={isStreaming && !analysisResult} />





                        {/* Thinking Process */}


                        <ThinkingProcess steps={thinkingSteps} isRunning={isStreaming} />


                    </div>





                    {/* Right: Chat */}


                    <div className="w-1/3 flex flex-col border-l border-slate-200 bg-white">


                        {/* Chat Header */}


                        <div className="p-4 border-b border-slate-200 bg-gradient-to-r from-blue-500 to-blue-600">


                            <div className="flex items-center space-x-3">


                                <div className="w-9 h-9 bg-white/20 rounded-lg flex items-center justify-center text-white"><Icons.Bot /></div>


                                <div>


                                    <h3 className="text-white font-semibold">AI Analyst</h3>


                                    <p className="text-blue-100 text-xs">Multi-Agent Analysis</p>


                                </div>


                            </div>


                        </div>





                        {/* Messages */}


                        <div className="flex-1 overflow-y-auto p-4 space-y-3 scrollbar-thin">


                            {messages.length === 0 && (


                                <div className="text-center text-slate-400 py-12">


                                    <div className="flex justify-center mb-3 text-slate-300"><Icons.Brain /></div>


                                    <p className="font-medium">Start analyzing {selectedSymbol}</p>


                                    <p className="text-sm mt-1">Type "analyze {selectedSymbol}" to start</p>


                                </div>


                            )}


                            {messages.map((msg, i) => (


                                <div key={i} ref={el => { if (el && typeof gsap !== 'undefined') gsap.fromTo(el, {opacity:0, y:15}, {opacity:1, y:0, duration:0.35, ease:'power2.out'}); }} className={`flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'} animate-fadeIn`}>


                                    <div className={`max-w-[85%] rounded-2xl px-4 py-3 shadow-sm ${msg.role === 'user' ? 'bg-blue-500 text-white' : 'bg-slate-100 text-slate-900'}`}>


                                        <div className="flex items-start space-x-2">


                                            {msg.role === 'assistant' && <div className="text-blue-500 mt-0.5"><Icons.Bot /></div>}


                                            <div className="whitespace-pre-wrap text-sm leading-relaxed">{msg.content}</div>


                                            {msg.role === 'user' && <div className="mt-0.5"><Icons.User /></div>}


                                        </div>


                                    </div>


                                </div>


                            ))}


                            {isStreaming && thinkingSteps.length === 0 && (


                                <div className="flex justify-start animate-fadeIn">


                                    <div className="bg-slate-100 rounded-2xl px-4 py-3">


                                        <div className="flex items-center space-x-2">


                                            <Icons.Loader />


                                            <span className="text-sm text-slate-500">Thinking...</span>


                                        </div>


                                    </div>


                                </div>


                            )}


                            <div ref={messagesEndRef} />


                        </div>





                        {/* Input */}


                        <div className="p-4 border-t border-slate-200">


                            <div className="flex space-x-2">


                                <input type="text" value={input} onChange={(e) => setInput(e.target.value)} onKeyDown={handleKeyPress}


                                    placeholder={`Ask about ${selectedSymbol}...`}


                                    className="flex-1 px-4 py-2.5 border border-slate-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm"


                                    disabled={isStreaming} />


                                <button onClick={handleSend} disabled={!input.trim() || isStreaming}


                                    className="px-4 py-2.5 bg-blue-500 text-white rounded-xl hover:bg-blue-600 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 disabled:opacity-50 disabled:cursor-not-allowed transition-colors">


                                    <Icons.Send />


                                </button>


                            </div>


                        </div>


                    </div>


                </div>


            );


        }





        ReactDOM.createRoot(document.getElementById('root')).render(<App />);


    </script>


</body>


</html>
